name: mergewong

services:
  app:
    image: registry.cn-hangzhou.aliyuncs.com/redgreat/mergewong:latest
    container_name: mergewong
    hostname: mergewong
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
